services:
  postgres:
    image: postgres:15-alpine
    container_name: creative_bot_postgres_prod
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: creative_bot_redis_prod
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: creative_bot_minio_prod
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data_prod:/data
    command: server /data --console-address ":9001"
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: creative_bot_backend_prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_SECRET_KEY: ${TELEGRAM_SECRET_KEY}
      API_URL: ${API_URL}
      MINI_APP_URL: ${MINI_APP_URL}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-0.1.0}
      SIGNED_PREVIEW_URL_TTL_SECONDS: ${SIGNED_PREVIEW_URL_TTL_SECONDS:-900}
      SIGNED_DOWNLOAD_URL_TTL_SECONDS: ${SIGNED_DOWNLOAD_URL_TTL_SECONDS:-900}
      DOWNLOAD_LOG_RETENTION_DAYS: ${DOWNLOAD_LOG_RETENTION_DAYS:-365}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_DIR: ${STORAGE_LOCAL_DIR:-/app/uploads}
    ports:
      - "3000:3000"
    volumes:
      - backend_uploads:/app/uploads
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: creative_bot_frontend_prod
    environment:
      VITE_API_URL: ${API_URL}
      VITE_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
    ports:
      - "3001:80"
    restart: always
    depends_on:
      - backend

  nginx:
    image: nginx:1.25-alpine
    container_name: creative_bot_nginx_prod
    environment:
      DOMAIN: ${DOMAIN}
      NGINX_ENVSUBST_OUTPUT_DIR: /etc/nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    command: >
      sh -c "mkdir -p /etc/letsencrypt/live/$${DOMAIN} &&
      if [ ! -f /etc/letsencrypt/live/$${DOMAIN}/fullchain.pem ]; then
        openssl req -x509 -nodes -newkey rsa:2048 -days 1
          -keyout /etc/letsencrypt/live/$${DOMAIN}/privkey.pem
          -out /etc/letsencrypt/live/$${DOMAIN}/fullchain.pem
          -subj /CN=$${DOMAIN};
      fi &&
      nginx -g 'daemon off;'"
    depends_on:
      - frontend
      - backend
    restart: always

  certbot:
    image: certbot/certbot:latest
    container_name: creative_bot_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_etc:/etc/letsencrypt
    entrypoint: /bin/sh
    command: -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h & wait $${!}; done"
    restart: always

  postgres-backup:
    image: postgres:15-alpine
    container_name: creative_bot_postgres_backup
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_MAX_AGE_SECONDS: ${BACKUP_MAX_AGE_SECONDS:-93600}
      BACKUP_OFFSITE_DIR: ${BACKUP_OFFSITE_DIR:-/offsite}
    volumes:
      - ./infra/backup/backup-postgres.sh:/usr/local/bin/backup-postgres.sh:ro
      - ./infra/backup/check-backup-fresh.sh:/usr/local/bin/check-backup-fresh.sh:ro
      - ${BACKUP_HOST_PATH:-./backups}:/backups
      - ${BACKUP_OFFSITE_HOST_PATH:-./backups-offsite}:/offsite
    command: sh -c "while true; do sh /usr/local/bin/backup-postgres.sh; sleep 86400; done"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "sh", "/usr/local/bin/check-backup-fresh.sh", "/backups/postgres"]
      interval: 1h
      timeout: 10s
      retries: 2
      start_period: 2h

  minio-backup:
    image: alpine:3.19
    container_name: creative_bot_minio_backup
    environment:
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-30}
      BACKUP_MAX_AGE_SECONDS: ${BACKUP_MAX_AGE_SECONDS:-93600}
      BACKUP_OFFSITE_DIR: ${BACKUP_OFFSITE_DIR:-/offsite}
    volumes:
      - minio_data_prod:/data:ro
      - ./infra/backup/backup-minio.sh:/usr/local/bin/backup-minio.sh:ro
      - ./infra/backup/check-backup-fresh.sh:/usr/local/bin/check-backup-fresh.sh:ro
      - ${BACKUP_HOST_PATH:-./backups}:/backups
      - ${BACKUP_OFFSITE_HOST_PATH:-./backups-offsite}:/offsite
    command: sh -c "while true; do sh /usr/local/bin/backup-minio.sh; sleep 86400; done"
    depends_on:
      minio:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "sh", "/usr/local/bin/check-backup-fresh.sh", "/backups/minio"]
      interval: 1h
      timeout: 10s
      retries: 2
      start_period: 2h

  ops-runner:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: creative_bot_ops_runner_prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME}
      TELEGRAM_SECRET_KEY: ${TELEGRAM_SECRET_KEY}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-0.1.0}
      DOWNLOAD_LOG_RETENTION_DAYS: ${DOWNLOAD_LOG_RETENTION_DAYS:-365}
      OPS_JOB_INTERVAL_SECONDS: ${OPS_JOB_INTERVAL_SECONDS:-3600}
      STORAGE_DRIVER: ${STORAGE_DRIVER:-s3}
      STORAGE_LOCAL_DIR: ${STORAGE_LOCAL_DIR:-/app/uploads}
    volumes:
      - backend_uploads:/app/uploads
    command: sh -c "while true; do npm run ops:maintenance; sleep $${OPS_JOB_INTERVAL_SECONDS}; done"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: creative_bot_prometheus_prod
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data_prod:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    restart: always
    depends_on:
      - backend

  loki:
    image: grafana/loki:2.9.8
    container_name: creative_bot_loki_prod
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./infra/loki/loki.yml:/etc/loki/local-config.yml:ro
      - loki_data_prod:/loki
    restart: always

  promtail:
    image: grafana/promtail:2.9.8
    container_name: creative_bot_promtail_prod
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/loki/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - loki
    restart: always

  grafana:
    image: grafana/grafana:10.4.12
    container_name: creative_bot_grafana_prod
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change-me}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data_prod:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3002:3000"
    depends_on:
      - prometheus
      - loki
    restart: always

volumes:
  postgres_data_prod:
  minio_data_prod:
  certbot_www:
  certbot_etc:
  prometheus_data_prod:
  loki_data_prod:
  grafana_data_prod:
  backend_uploads:

networks:
  default:
    name: creative_bot_network_prod
